<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>車牌管理系統 V3</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #6750A4; --surface: #f3edf7; --error: #B3261E;
            --warning: #FF9800; --warning-light: #FFF3E0; --outline: #79747E;
            --success: #2E7D32; --forest-green: #2D6A4F;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: #f0f0f0; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .phone-wrapper { width: 100%; max-width: 500px; height: 100%; background: #fff; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative; }
        
        /* Header */
        .header { height: 60px; background: var(--surface); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #ddd; flex-shrink: 0; position: relative; }
        .header-title { font-weight: bold; font-size: 18px; }
        .header-btns { position: absolute; right: 10px; display: flex; gap: 6px; }

        .main-container { flex: 1; display: flex; flex-direction: column; padding: 10px; overflow: hidden; }
        
        /* 搜尋介面 */
        .display-box { width: 100%; height: 50px; border: 2px solid var(--primary); border-radius: 8px; font-size: 24px; font-weight: bold; display: flex; align-items: center; padding: 0 12px; margin-bottom: 5px; background: #fff; }
        .keyboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding-bottom: 10px; flex-shrink: 0; }
        .btn { height: 42px; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; background: #EADDFF; cursor: pointer; }
        .btn.error { background: var(--error); color: white; }
        .btn-search { grid-column: span 3; height: 48px; background: var(--primary); color: white; }
        #search-status { font-size: 16px; font-weight: bold; text-align: center; min-height: 24px; margin-bottom: 8px; }

        /* 管理區域 */
        .manage-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 10px; flex-shrink: 0; }
        .count-text { font-size: 13px; font-weight: bold; color: var(--primary); }
        .add-trigger-btn { flex: 1; height: 50px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }

        .tab-row { display: flex; border-bottom: 1px solid #eee; flex-shrink: 0; background: #fff; }
        .tab { flex: 1; padding: 12px 5px; text-align: center; font-size: 13px; cursor: pointer; color: #666; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); font-weight: bold; }

        .batch-bar { display: none; gap: 6px; padding: 8px; background: #f9f9f9; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .batch-btn { flex: 1; height: 36px; border: 1px solid var(--primary); border-radius: 6px; background: #fff; color: var(--primary); font-size: 12px; font-weight: bold; }
        .multi-del-btn { flex: 2; height: 36px; background: var(--error); color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 12px; }

        /* 清單恢復 3 行設計 */
        .list-area { flex: 1; overflow-y: auto; border: 1px solid #eee; border-radius: 4px; background: #fafafa; }
        .item-row { padding: 12px; border-bottom: 1px solid #eee; background: #fff; display: flex; align-items: center; gap: 10px; }
        .item-row.expired { background-color: var(--warning-light); }
        .item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
        .plate-line-1 { font-size: 19px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .plate-line-2, .plate-line-3 { font-size: 12px; color: #555; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .status-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .status-ok { background: #E8F5E9; color: var(--success); }
        .status-bad { background: #FFEBEE; color: var(--error); }

        .check-circle { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--outline); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .check-circle.active { background: var(--primary); border-color: var(--primary); }
        .check-circle.active::after { content: '✓'; color: white; font-weight: bold; font-size: 14px; }
        .edit-btn { background: #fff; border: 1px solid var(--primary); color: var(--primary); padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }

        /* 彈窗樣式 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 450px; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px; max-height: 95vh; overflow: hidden; }
        .modal-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 10px; }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .modal-field { display: flex; flex-direction: column; gap: 3px; }
        .modal-field label { font-size: 11px; font-weight: bold; color: #666; }
        .modal-input { border: 1px solid #ccc; border-radius: 6px; padding: 8px; font-size: 14px; width: 100%; }
        
        /* 狀態按鈕組 */
        .status-group { display: flex; gap: 3px; width: 100%; }
        .status-opt { flex: 1; height: 34px; border: 1px solid #ccc; border-radius: 4px; background: #fff; font-size: 11px; cursor: pointer; }
        .status-opt.active[data-val="正常"] { background: var(--success); color: white; border-color: var(--success); }
        .status-opt.active:not([data-val="正常"]) { background: var(--error); color: white; border-color: var(--error); }

        .btn-del-action { width: 100%; height: 42px; background: var(--error); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; flex-shrink: 0; }

        .nav { height: 60px; background: var(--surface); display: flex; border-top: 1px solid #ddd; flex-shrink: 0; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #79747E; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        #cam-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: #000; }
        .scan-rect { position: absolute; top: 35%; left: 50%; transform: translate(-50%,-50%); width: 280px; height: 110px; border: 2px solid #fff; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); }
        
        .text-red { color: var(--error); font-weight: bold; }
        .text-orange-bold { color: var(--warning); font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="phone-wrapper">
    <div class="header">
        <div class="header-title">車牌管理系統 V3</div>
        <div class="header-btns" id="manage-btns" style="display: none;">
            <button style="background:var(--forest-green); color:white; border:none; padding:6px 10px; border-radius:4px; font-size:11px;" onclick="openIOModal('export')">匯出</button>
            <button style="background:var(--forest-green); color:white; border:none; padding:6px 10px; border-radius:4px; font-size:11px;" onclick="openIOModal('import')">匯入</button>
        </div>
    </div>

    <div class="main-container" id="page-search">
        <div class="display-box" id="num-display"></div>
        <div id="search-status"></div>
        <div class="list-area" id="search-results"></div>
        <div class="keyboard">
            <button class="btn" onclick="k('1')">1</button><button class="btn" onclick="k('2')">2</button><button class="btn" onclick="k('3')">3</button>
            <button class="btn" onclick="k('4')">4</button><button class="btn" onclick="k('5')">5</button><button class="btn" onclick="k('6')">6</button>
            <button class="btn" onclick="k('7')">7</button><button class="btn" onclick="k('8')">8</button><button class="btn" onclick="k('9')">9</button>
            <button class="btn error" onclick="k('C')">C</button><button class="btn" onclick="k('0')">0</button><button class="btn error" onclick="k('B')">⌫</button>
            <button class="btn btn-search" onclick="doSearch()">搜尋</button>
        </div>
    </div>

    <div class="main-container" id="page-manage" style="display:none;">
        <div class="manage-top">
            <span class="count-text" id="total-count">目前共有 0 輛車</span>
            <button class="add-trigger-btn" onclick="openModal('add')">+ 新增車輛</button>
        </div>
        <div class="tab-row">
            <div class="tab active" id="tab-alpha" onclick="handleSort('alpha')">車號 <span id="arr-alpha">▲</span></div>
            <div class="tab" id="tab-date" onclick="handleSort('date')">建檔日 <span id="arr-date">▼</span></div>
            <div class="tab" id="tab-expiry" onclick="handleSort('expiry')">到期日 <span id="arr-expiry">▲</span></div>
        </div>
        <div class="batch-bar" id="batch-control-bar">
            <button class="batch-btn" onclick="selectAll(true)">全選</button>
            <button class="batch-btn" onclick="selectAll(false)">全不選</button>
            <button class="multi-del-btn" id="btn-multi-del" onclick="multiDel()">刪除已選 (0)</button>
        </div>
        <div class="list-area" id="full-list"></div>
    </div>

    <div class="nav">
        <div class="nav-item" onclick="openCam()"><span>📷</span><span>掃描</span></div>
        <div class="nav-item active" id="nav-search" onclick="switchPage('search')"><span>⌨️</span><span>搜尋</span></div>
        <div class="nav-item" id="nav-manage" onclick="switchPage('manage')"><span>⚙️</span><span>管理</span></div>
    </div>
</div>

<div class="modal-overlay" id="plate-modal">
    <div class="modal-content">
        <div style="font-weight:bold; color:var(--primary); border-bottom:2px solid #eee; padding-bottom:8px; flex-shrink:0;" id="modal-title">新增車輛</div>
        <div class="modal-scroll">
            <input type="hidden" id="edit-old-num">
            <div class="modal-grid">
                <div class="modal-field"><label>車牌號碼</label><input type="text" id="m-num" class="modal-input" oninput="this.value=this.value.toUpperCase()"></div>
                <div class="modal-field">
                    <label>狀態標記</label>
                    <div class="status-group">
                        <button class="status-opt active" data-val="正常" onclick="setStatus('正常')">正常</button>
                        <button class="status-opt" data-val="不明" onclick="setStatus('不明')">不明</button>
                        <button class="status-opt" data-val="欠費" onclick="setStatus('欠費')">欠費</button>
                    </div>
                    <input type="hidden" id="m-status" value="正常">
                </div>
            </div>
            <div class="modal-grid">
                <div class="modal-field"><label>車主</label><input type="text" id="m-owner" class="modal-input"></div>
                <div class="modal-field"><label>身分</label><input type="text" id="m-identity" class="modal-input"></div>
            </div>
            <div class="modal-grid">
                <div class="modal-field"><label>連絡電話</label><input type="text" id="m-phone" class="modal-input"></div>
                <div class="modal-field"><label>品牌</label><input type="text" id="m-brand" class="modal-input"></div>
            </div>
            <div class="modal-grid">
                <div class="modal-field"><label>顏色</label><input type="text" id="m-color" class="modal-input"></div>
                <div class="modal-field"><label>到期日期</label><input type="date" id="m-expiry" class="modal-input"></div>
            </div>
            <div class="modal-field"><label>備註</label><input type="text" id="m-remark" class="modal-input"></div>
            
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button style="flex:1; height:45px; border-radius:6px; border:none; background:#eee;" onclick="closeModal()">取消</button>
                <button style="flex:1; height:45px; border-radius:6px; border:none; background:var(--primary); color:white; font-weight:bold;" onclick="processModal()">儲存</button>
            </div>
            <button id="modal-del-btn" class="btn-del-action" style="display:none;" onclick="deleteCurrent()">刪除此車資料</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="io-modal">
    <div class="modal-content">
        <h3 id="io-title" style="margin:0; flex-shrink:0;">資料操作</h3>
        <div id="io-export-options" style="display:none; gap:10px;">
            <button class="btn" style="flex:1; background:var(--forest-green); color:white; font-size:14px;" onclick="exportText()">文字匯出</button>
            <button class="btn" style="flex:1; background:var(--primary); color:white; font-size:14px;" onclick="exportExcel()">Excel匯出</button>
        </div>
        <div id="io-import-options" style="display:none; flex-direction:column; gap:10px;">
            <p style="font-size:11px; color:var(--error); margin:0;">* 匯入後將覆蓋舊有資料</p>
            <textarea id="io-area" style="height:120px; padding:8px; font-size:12px;" placeholder="貼上文字內容..."></textarea>
            <button class="btn" style="background:var(--primary); color:white; font-size:14px;" onclick="importText()">執行文字匯入</button>
            <hr style="width:100%;">
            <input type="file" id="io-file" accept=".xlsx, .xls">
            <button class="btn" style="background:var(--forest-green); color:white; font-size:14px;" onclick="importExcel()">執行 Excel 匯入</button>
        </div>
        <button class="btn" style="background:#eee; margin-top:5px;" onclick="closeIOModal()">關閉視窗</button>
    </div>
</div>

<div id="cam-overlay">
    <video id="video" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
    <div class="scan-rect" id="scan-rect"></div>
    <div style="position:absolute; bottom:50px; width:100%; display:flex; flex-direction:column; align-items:center; gap:15px;">
        <div id="scan-result-text" style="color:#fff; background:rgba(0,0,0,0.8); padding:8px 16px; border-radius:8px;">準備就緒</div>
        <button onclick="captureOCR()" style="width:70px; height:70px; border-radius:50%; border:5px solid #fff; background:var(--error);"></button>
        <button onclick="closeCam()" style="color:white; background:rgba(255,255,255,0.2); border:1px solid #fff; padding:8px 30px; border-radius:20px;">返回</button>
    </div>
    <canvas id="crop-canvas" style="display:none;"></canvas>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('plates_v3_9') || '[]');
    let selectedSet = new Set(), inputStr = "", currentSort = 'alpha', sortDir = { alpha: 1, date: -1, expiry: 1 }, worker = null;

    const labelMap = { num:"車號", owner:"車主", identity:"身分", phone:"電話", brand:"品牌", color:"顏色", expiry:"到期日", date:"建檔日", remark:"備註", status:"狀態" };
    const revMap = { "車號":"num", "車主":"owner", "身分":"identity", "電話":"phone", "品牌":"brand", "顏色":"color", "到期日":"expiry", "建檔日":"date", "備註":"remark", "狀態":"status" };

    const getToday = () => new Date().toISOString().split('T')[0];
    const isExpired = (expiryStr) => expiryStr ? expiryStr <= getToday() : false;

    function saveDB() {
        localStorage.setItem('plates_v3_9', JSON.stringify(db));
        document.getElementById('total-count').innerText = `目前共有 ${db.length} 輛車`;
        renderFull();
    }

    function setStatus(val) {
        document.getElementById('m-status').value = val;
        document.querySelectorAll('.status-opt').forEach(b => b.classList.toggle('active', b.getAttribute('data-val') === val));
    }

    function generateItemHTML(p, showManage = false) {
        const expired = isExpired(p.expiry);
        const val = (v, label) => (v && v.trim() !== "") ? v : `無${label}`;
        const stClass = p.status === '正常' ? 'status-ok' : 'status-bad';
        return `
            <div class="item-row ${expired ? 'expired' : ''}">
                ${showManage ? `<div class="check-circle ${selectedSet.has(p.num)?'active':''}" onclick="toggleSelect('${p.num}')"></div>` : ''}
                <div class="item-info">
                    <div class="plate-line-1">
                        ${p.num} ${expired ? '<span class="text-orange-bold">[到期]</span>' : ''}
                        <span class="status-badge ${stClass}">${p.status || '正常'}</span>
                    </div>
                    <div class="plate-line-2">建檔: ${val(p.date, '日')} | 到期: <span class="${expired?'text-red':''}">${val(p.expiry, '日')}</span> | ${val(p.brand, '品牌')} | ${val(p.color, '顏色')}</div>
                    <div class="plate-line-3">${val(p.owner, '車主')} | ${val(p.identity, '身分')} | ${val(p.phone, '電話')} | ${val(p.remark, '備註')}</div>
                </div>
                ${showManage ? `<button class="edit-btn" onclick="openModal('edit', '${p.num}')">編輯</button>` : ''}
            </div>`;
    }

    function toggleSelect(n) { if(selectedSet.has(n)) selectedSet.delete(n); else selectedSet.add(n); updateBatchUI(); }
    function selectAll(s) { if(s) db.forEach(p => selectedSet.add(p.num)); else selectedSet.clear(); updateBatchUI(); }
    function updateBatchUI() {
        document.getElementById('batch-control-bar').style.display = selectedSet.size > 0 ? 'flex' : 'none';
        document.getElementById('btn-multi-del').innerText = `刪除已選 (${selectedSet.size})`;
        renderFull();
    }
    function multiDel() { if(confirm(`確定刪除這 ${selectedSet.size} 筆？`)) { db = db.filter(p => !selectedSet.has(p.num)); selectedSet.clear(); updateBatchUI(); saveDB(); } }

    function openModal(mode, num = null) {
        ['m-num','m-owner','m-identity','m-phone','m-brand','m-color','m-expiry','m-remark','edit-old-num'].forEach(id => document.getElementById(id).value = "");
        setStatus('正常');
        if(mode === 'edit') {
            const data = db.find(x => x.num === num);
            if(data) {
                document.getElementById('edit-old-num').value = data.num;
                document.getElementById('m-num').value = data.num;
                document.getElementById('m-owner').value = data.owner || "";
                document.getElementById('m-identity').value = data.identity || "";
                document.getElementById('m-phone').value = data.phone || "";
                document.getElementById('m-brand').value = data.brand || "";
                document.getElementById('m-color').value = data.color || "";
                document.getElementById('m-expiry').value = data.expiry || "";
                document.getElementById('m-remark').value = data.remark || "";
                setStatus(data.status || '正常');
            }
            document.getElementById('modal-del-btn').style.display = "block";
            document.getElementById('modal-title').innerText = "編輯車輛資料";
        } else {
            document.getElementById('modal-del-btn').style.display = "none";
            document.getElementById('modal-title').innerText = "新增車輛";
        }
        document.getElementById('plate-modal').style.display = "flex";
    }
    function closeModal() { document.getElementById('plate-modal').style.display = "none"; }
    function processModal() {
        const old = document.getElementById('edit-old-num').value, num = document.getElementById('m-num').value.toUpperCase().trim();
        if(!num) return;
        const info = { num, owner:document.getElementById('m-owner').value, identity:document.getElementById('m-identity').value, phone:document.getElementById('m-phone').value, brand:document.getElementById('m-brand').value, color:document.getElementById('m-color').value, expiry:document.getElementById('m-expiry').value||null, remark:document.getElementById('m-remark').value, status:document.getElementById('m-status').value };
        if(old) { const idx = db.findIndex(x => x.num === old); if(idx !== -1) db[idx] = { ...db[idx], ...info }; }
        else { if(db.some(x => x.num === num)) return alert("重複"); db.push({ ...info, date: getToday() }); }
        saveDB(); closeModal();
    }
    function deleteCurrent() { const n = document.getElementById('edit-old-num').value; if(confirm(`確定刪除 ${n}?`)) { db = db.filter(x => x.num !== n); selectedSet.delete(n); saveDB(); updateBatchUI(); closeModal(); } }

    function handleSort(t) { if (currentSort === t) sortDir[t] *= -1; else currentSort = t; renderFull(); }
    function renderFull() {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.id === 'tab-'+currentSort));
        ['alpha', 'date', 'expiry'].forEach(k => document.getElementById('arr-' + k).innerText = sortDir[k] === 1 ? '▲' : '▼');
        let list = [...db].sort((a,b) => {
            let vA = currentSort==='alpha'?a.num:(currentSort==='date'?a.date:(a.expiry||'9999-12-31'));
            let vB = currentSort==='alpha'?b.num:(currentSort==='date'?b.date:(b.expiry||'9999-12-31'));
            return vA.localeCompare(vB) * sortDir[currentSort];
        });
        document.getElementById('full-list').innerHTML = list.map(p => generateItemHTML(p, true)).join('');
    }

    // 匯出通知
    function alertResult(type) {
        const now = new Date().toLocaleString();
        alert(`匯出成功！ (${type})\n時間: ${now}\n總筆數: ${db.length} 筆`);
    }

    function exportText() {
        const exportData = db.map(item => {
            let n = {};
            Object.keys(labelMap).forEach(k => n[labelMap[k]] = item[k] || "");
            return n;
        });
        const now = new Date().toLocaleString();
        const header = `// 車牌管理系統備份\n// 匯出時間: ${now}\n// 資料筆數: ${db.length} 筆\n\n`;
        const s = header + `DATA:${JSON.stringify(exportData, null, 2)}`;
        navigator.clipboard.writeText(s).then(() => {
            alertResult("文字複製");
        });
    }

    function exportExcel() {
        const data = db.map(item => {
            let n = {};
            Object.keys(labelMap).forEach(k => n[labelMap[k]] = item[k] || "");
            return n;
        });
        const ws = XLSX.utils.json_to_sheet(data);
        const range = XLSX.utils.decode_range(ws['!ref']);
        for(let R = range.s.r; R <= range.e.r; ++R) {
            for(let C = range.s.c; C <= range.e.c; ++C) {
                const cell = ws[XLSX.utils.encode_cell({r:R, c:C})];
                if(cell) cell.z = '@'; 
            }
        }
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        const now = new Date();
        const ts = now.getFullYear() + (now.getMonth()+1).toString().padStart(2,'0') + now.getDate().toString().padStart(2,'0') + "_" + now.getHours().toString().padStart(2,'0') + now.getMinutes().toString().padStart(2,'0') + now.getSeconds().toString().padStart(2,'0');
        XLSX.writeFile(wb, `車牌資料_${ts}.xlsx`);
        alertResult("Excel 檔案");
    }

    function openIOModal(mode) {
        document.getElementById('io-modal').style.display = 'flex';
        document.getElementById('io-title').innerText = mode === 'export' ? '匯出資料庫' : '匯入資料庫';
        document.getElementById('io-export-options').style.display = mode === 'export' ? 'flex' : 'none';
        document.getElementById('io-import-options').style.display = mode === 'import' ? 'flex' : 'none';
        document.getElementById('io-area').value = "";
    }
    function closeIOModal() { document.getElementById('io-modal').style.display = 'none'; }

    function importText() {
        try {
            const raw = document.getElementById('io-area').value;
            let data = JSON.parse(raw.includes('DATA:') ? raw.split('DATA:')[1] : raw);
            if (data.length > 0 && data[0]["車號"]) {
                data = data.map(row => {
                    let n = {};
                    Object.keys(revMap).forEach(cn => n[revMap[cn]] = row[cn] ? String(row[cn]) : "");
                    return n;
                });
            }
            if(confirm("即將覆蓋並匯入？")) { db = data; saveDB(); closeIOModal(); }
        } catch(e) { alert("格式錯誤"); }
    }

    function importExcel() {
        const file = document.getElementById('io-file').files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
            const raw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            const cleaned = raw.map(row => {
                let n = {};
                Object.keys(revMap).forEach(cn => {
                    const foundKey = Object.keys(row).find(rk => rk.trim() === cn);
                    n[revMap[cn]] = foundKey ? String(row[foundKey]).trim() : "";
                });
                return n;
            });
            if(confirm("即將覆蓋並匯入？")) { db = cleaned; saveDB(); closeIOModal(); }
        };
        reader.readAsArrayBuffer(file);
    }

    // 搜尋功能
    function doSearch() {
        const res = db.filter(p => p.num.includes(inputStr));
        document.getElementById('search-status').innerHTML = res.length > 0 ? `<span style="color:var(--success)">有 ${res.length} 筆符合</span>` : `<span style="color:var(--error)">查無資料</span>`;
        document.getElementById('search-results').innerHTML = inputStr ? res.map(p => generateItemHTML(p, false)).join('') : "";
    }
    function k(v) {
        if(v==='C') { inputStr = ""; document.getElementById('search-results').innerHTML = ""; }
        else if(v==='B') inputStr = inputStr.slice(0,-1);
        else if(inputStr.length < 10) inputStr += v;
        document.getElementById('num-display').innerText = inputStr;
    }
    function switchPage(p) {
        document.getElementById('page-search').style.display = p==='search'?'flex':'none';
        document.getElementById('page-manage').style.display = p==='manage'?'flex':'none';
        document.getElementById('manage-btns').style.display = p==='manage'?'flex':'none';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.id === 'nav-'+p));
    }

    async function openCam() {
        document.getElementById('cam-overlay').style.display='block';
        document.getElementById('scan-result-text').innerText = "啟動中...";
        try {
            const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
            document.getElementById('video').srcObject = s;
            if(!worker) {
                worker = await Tesseract.createWorker('eng');
                await worker.setParameters({ tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-' });
            }
            document.getElementById('scan-result-text').innerText = "準備就緒";
        } catch(e) { alert("相機失敗"); closeCam(); }
    }
    function closeCam() {
        const v = document.getElementById('video');
        if(v.srcObject) v.srcObject.getTracks().forEach(t=>t.stop());
        document.getElementById('cam-overlay').style.display='none';
    }
    async function captureOCR() {
        const v = document.getElementById('video'), c = document.getElementById('crop-canvas'), resT = document.getElementById('scan-result-text');
        resT.innerText = "辨識中...";
        const rect = document.getElementById('scan-rect').getBoundingClientRect();
        const sX = v.videoWidth / window.innerWidth, sY = v.videoHeight / window.innerHeight;
        c.width = rect.width * sX; c.height = rect.height * sY;
        c.getContext('2d').drawImage(v, rect.left*sX, rect.top*sY, rect.width*sX, rect.height*sY, 0, 0, c.width, c.height);
        const { data: { text } } = await worker.recognize(c);
        const clean = text.replace(/[^A-Z0-9]/g, "").trim();
        if(clean.length >= 4) {
            const m = db.find(x => x.num.replace("-","") === clean);
            resT.innerHTML = `車號: ${clean} ${m ? '<br><span style="color:#0f0">● 已授權</span>' : '<br><span style="color:#f44">✖ 未授權</span>'}`;
        } else resT.innerText = "請重試";
    }

    saveDB();
</script>
